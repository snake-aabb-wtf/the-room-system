<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>文件传输 · 登录</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="/static/toast.css">
</head>
<body>
<div class="wrap narrow" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px">
  <div class="login-box" style="width:100%">
    <h1>📁 文件传输</h1>
    <div class="lead">输入口令进入房间，或创建一个新房间</div>
    <input type="password" id="pw" placeholder="输入口令" autofocus
           aria-label="房间口令"
           onkeydown="if(event.key==='Enter')go()">
    <button class="btn" style="width:100%" onclick="go()">→ 进入房间</button>
    <button class="btn sec" style="width:100%;margin-top:10px" onclick="createRoom()">✨ 随机创建一个房间</button>

    {% if urls %}
    <div class="urls" aria-label="本机访问地址">
      <div class="muted tiny" style="margin-bottom:8px">本机可访问地址（直接复制给对方）</div>
      {% for u in urls %}
      <div class="url">
        <span>{{ u }}</span>
        <button class="copy" aria-label="复制 {{ u }}" onclick="copy('{{ u }}')">复制</button>
      </div>
      {% endfor %}
    </div>
    {% endif %}
  </div>
</div>
<script src="/static/toast.js"></script>
<script src="/static/error.js"></script>
<script>
async function go(){
  var pw=document.getElementById('pw').value.trim();
  if(!pw){toast.error('请输入口令'); return;}
  try{
    const r=await fetch('/auth',{method:'POST',body:new URLSearchParams({password:pw})});
    if(r.ok){window.location.href='/room';}
    else if(r.status===403){toast.error('口令错误或房间被禁用');}
    else{toast.error('登录失败：'+r.status);}
  }catch(e){/* error.js 已 toast 提示 */}
}
async function createRoom(){
  var pw=Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,6);
  try{
    const r=await fetch('/auth',{method:'POST',body:new URLSearchParams({password:pw})});
    if(r.ok){window.location.href='/room';}
    else{toast.error('创建失败：'+r.status);}
  }catch(e){}
}
function copy(t){
  navigator.clipboard.writeText(t).then(()=>{
    const btn=event.target; const old=btn.textContent; btn.textContent='已复制✓';
    setTimeout(()=>btn.textContent=old,1200);
  }).catch(()=>toast.error('复制失败，请手动选中'));
}
</script>
</body>
</html>
